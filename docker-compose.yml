services:
  n8n:
    image: n8nio/n8n
    container_name: n8n
    restart: always
    ports:
      - "127.0.0.1:5678:5678"
    volumes:
      - ~/apps/n8n-data:/home/node/.n8n
    environment:
      - GENERIC_TIMEZONE=America/Chicago
      - VERBOSE_ERRORS=false
      - N8N_SECURE_COOKIE=true
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      - N8N_HOST=n8n.rexxroofing.com
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://n8n.rexxroofing.com/
